<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-icon.png" />
    <title>Go · /go</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b;
        --bg-elev: #0c0c0e;
        --card: #0e0e11;
        --border: #1f1f23;
        --fg: #fafafa;
        --muted: #a1a1aa;
        --subtle: #71717a;
        --accent: #00add8;
        --radius: 12px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh;
        display: grid; place-items: center; padding: 2rem 1.5rem;
        background: var(--bg); color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        background-image:
          radial-gradient(50rem 50rem at 50% -15rem, rgba(0, 173, 216, 0.08), transparent 70%),
          radial-gradient(circle at 1px 1px, rgba(255,255,255,0.035) 1px, transparent 0);
        background-size: auto, 22px 22px;
      }
      .card {
        width: min(620px, 100%);
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 2rem;
      }
      .back { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--subtle); text-decoration: none; font-size: 0.8rem; margin-bottom: 1.75rem; }
      .back:hover { color: var(--fg); }
      .head { display: flex; align-items: center; gap: 0.85rem; margin: 0.85rem 0 1rem; }
      .icon { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-elev); }
      .icon svg { width: 22px; height: 22px; fill: var(--fg); }
      .badge { display: inline-flex; align-items: center; justify-content: center; line-height: 1; padding: 0.42rem 0.6rem 0.34rem; border-radius: 999px; background: var(--accent); color: #06141a; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
      h1 { margin: 0; font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; }
      p { margin: 0 0 1.5rem; color: var(--muted); font-size: 0.92rem; }
      dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 0.6rem 1rem; font-size: 0.85rem; }
      dt { color: var(--subtle); }
      dd { margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </head>

</html>
