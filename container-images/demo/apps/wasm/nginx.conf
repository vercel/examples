worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Ensure .wasm is served with the correct MIME type for streaming compilation.
  types {
    application/wasm wasm;
  }

  sendfile on;

  server {
    # Vercel routes traffic to port 80 by default.
    listen 80;
    server_name _;

    # The service is mounted behind the "/wasm" prefix (path is preserved).
    # Redirect the bare prefix to a trailing slash so relative asset paths work.
    location = /wasm {
      return 308 /wasm/;
    }

    location /wasm/ {
      alias /usr/share/nginx/html/;
      index index.html;
      try_files $uri $uri/ /wasm/index.html;
    }

    # Health/fallback
    location / {
      return 308 /wasm/;
    }
  }
}
